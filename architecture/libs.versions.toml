[versions]
kotlin = "2.3.10"
spring-boot = "4.0.2"
spring-dependency-management = "1.1.7"
detekt = "2.0.0-alpha.2"
ktlint-plugin = "13.1.0"
graalvm-native = "0.11.1"
junit = "5.13.4"
mockk = "1.14.6"
springmockk = "4.0.2"
reactor-kotlin-extensions = "1.2.3"
coroutines = "1.10.2"
testcontainers = "1.21.3"
konsist = "0.17.3"
minio = "8.5.17"
jacoco = "0.8.13"
spring-cloud-contract = "4.3.0"
aws-sdk = "2.31.28"
gcp-bom = "26.78.0"
oci-sdk = "3.81.1"
postgresql = "42.7.10"
oracle-jdbc = "23.26.1.0.0"

[plugins]
kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
kotlin-spring = { id = "org.jetbrains.kotlin.plugin.spring", version.ref = "kotlin" }
spring-boot = { id = "org.springframework.boot", version.ref = "spring-boot" }
spring-dependency-management = { id = "io.spring.dependency-management", version.ref = "spring-dependency-management" }
detekt = { id = "dev.detekt", version.ref = "detekt" }
ktlint = { id = "org.jlleitschuh.gradle.ktlint", version.ref = "ktlint-plugin" }
graalvm-native = { id = "org.graalvm.buildtools.native", version.ref = "graalvm-native" }

[libraries]
kotlin-gradle-plugin = { module = "org.jetbrains.kotlin:kotlin-gradle-plugin", version.ref = "kotlin" }
kotlin-spring-gradle-plugin = { module = "org.jetbrains.kotlin.plugin.spring:org.jetbrains.kotlin.plugin.spring.gradle.plugin", version.ref = "kotlin" }
spring-boot-gradle-plugin = { module = "org.springframework.boot:spring-boot-gradle-plugin", version.ref = "spring-boot" }
