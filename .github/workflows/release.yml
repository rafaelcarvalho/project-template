name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_OWNER: ${{ vars.DOCKERHUB_OWNER != '' && vars.DOCKERHUB_OWNER || 'rafac' }}
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '21'
          cache: 'gradle'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build release artifacts
        env:
          SEMANTIC_VERSION: ${{ steps.version.outputs.VERSION }}
        run: ./gradlew build -x test --no-daemon

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/libs/*.jar
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: vars.SKIP_DOCKER_PUSH != 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKERHUB_OWNER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./app/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ vars.SKIP_DOCKER_PUSH != 'true' }}
          tags: |
            ${{ env.DOCKERHUB_OWNER }}/${{ github.event.repository.name }}:${{ steps.version.outputs.VERSION }}
            ${{ env.DOCKERHUB_OWNER }}/${{ github.event.repository.name }}:latest
